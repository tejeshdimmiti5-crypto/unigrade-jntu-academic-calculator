<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGPA Calculator | UniGrade</title>

    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/navbar.css">
    <link rel="stylesheet" href="../css/calculator.css">
    <link rel="stylesheet" href="../css/responsive.css">
</head>
<body>

<header class="navbar">

    <div class="logo">
        🎓 <span>UniGrade</span>
    </div>

    <nav>

        <a href="../index.html">Home</a>

        <a href="sgpa.html" class="active">SGPA</a>

        <a href="cgpa.html">CGPA</a>

        <a href="about.html">About</a>

        <a href="contact.html">Contact</a>

    </nav>

</header>

<section class="calculator">

<h1>SGPA Calculator</h1>

<p>JNTUK R23 Regulation</p>

<div class="semester">

<label>Semester</label>

<select id="semester">

<option>1-1</option>
<option>1-2</option>
<option>2-1</option>
<option>2-2</option>
<option>3-1</option>
<option>3-2</option>
<option>4-1</option>
<option>4-2</option>

</select>

</div>

<table id="sgpaTable">

<thead>

<tr>

<th>Subject</th>

<th>Credits</th>

<th>Grade</th>

</tr>

</thead>

<tbody>

<!-- 12 rows -->

<tr>

<td>Subject 1</td>

<td><input type="number" min="0" max="10"></td>

<td>

<select>

<option value="">Select</option>

<option>S</option>

<option>A+</option>

<option>A</option>

<option>B</option>

<option>C</option>

<option>D</option>

<option>E</option>

<option>F</option>

</select>

</td>

</tr>

<!-- Repeat this row until Subject 12 -->

</tbody>

</table>

<div class="buttons">

<button id="calculateBtn">

Calculate SGPA

</button>

<button id="resetBtn">

Reset

</button>

</div>

<div id="resultCard">

<h2>Result</h2>

<p>SGPA : <span id="sgpaResult">0.00</span></p>

<p>Total Credits : <span id="creditResult">0</span></p>

<p>Total Grade Points : <span id="gpResult">0</span></p>

<p>Percentage : <span id="percentageResult">0%</span></p>

<p>Performance : <span id="performance">-</span></p>

</div>

</section>

<script src="../js/sgpa.js"></script>

</body>
</html>
