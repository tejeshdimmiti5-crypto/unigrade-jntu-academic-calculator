
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>UniGrade | CGPA Calculator</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="container">

<h1>🎓 CGPA Calculator</h1>

<p>Enter your Semester SGPAs</p>

<input type="number" id="sem1" placeholder="Semester 1 SGPA" step="0.01" min="0" max="10">

<input type="number" id="sem2" placeholder="Semester 2 SGPA" step="0.01" min="0" max="10">

<input type="number" id="sem3" placeholder="Semester 3 SGPA" step="0.01" min="0" max="10">

<input type="number" id="sem4" placeholder="Semester 4 SGPA" step="0.01" min="0" max="10">

<input type="number" id="sem5" placeholder="Semester 5 SGPA" step="0.01" min="0" max="10">

<input type="number" id="sem6" placeholder="Semester 6 SGPA" step="0.01" min="0" max="10">

<input type="number" id="sem7" placeholder="Semester 7 SGPA" step="0.01" min="0" max="10">

<input type="number" id="sem8" placeholder="Semester 8 SGPA" step="0.01" min="0" max="10">

<button onclick="calculateCGPA()">

Calculate CGPA

</button>

<div id="result"></div>

</div>

<script src="cgpa.js"></script>

</body>
</html>
